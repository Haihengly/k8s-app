apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: react-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-app
  template: 
    metadata:
      labels:
        app: react-app
    spec: 
      containers:
      - name: react-app
        image: haihengly/react-app:75
        ports:
        - containerPort: 80