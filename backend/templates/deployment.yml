apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: backend-deploy
spec:
  serviceName: backend-service 
  replicas: 2
  selector:
    matchLabels: 
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: haihengly/backend-app:v1.3
        ports:
        - containerPort: 5000
        envFrom:
          - configMapRef:
              name: backend-config
          - secretRef:
              name: backend-secret

        readinessProbe:
          httpGet:
            path: /readyz
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"

